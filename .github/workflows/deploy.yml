name: 每日涨停天梯图更新

on:
  schedule:
    # 北京时间每周一到周五 15:30 (UTC 07:30)
    - cron: '30 7 * * 1-5'
  workflow_dispatch:  # 手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install akshare pandas lxml html5lib

      - name: 运行天梯图生成
        run: |
          python stock_dashboard.py -o index.html
        working-directory: stock_tool

      - name: 移动输出文件
        run: |
          cp stock_tool/index.html index.html

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "📈 更新天梯图 $(TZ='Asia/Shanghai' date +%Y-%m-%d)"
          git push
